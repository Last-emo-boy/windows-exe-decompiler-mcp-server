name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install baseline Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Build TypeScript
        run: npm run build

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Validate Python worker syntax
        run: python -m py_compile workers/static_worker.py workers/speakeasy_compat.py

      - name: Run full unit test suite
        run: >
          npm test -- --runInBand --forceExit --testPathPatterns="tests/unit/"
        timeout-minutes: 20

      - name: Run integration tests
        run: >
          npm test -- --runInBand --forceExit --testPathPatterns="tests/integration/"
        timeout-minutes: 10
        continue-on-error: true

      - name: Generate coverage report
        run: >
          npm run test:coverage -- --runInBand --forceExit --testPathPatterns="tests/unit/"
        timeout-minutes: 20
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Validate npm package contents
        run: npm run pack:dry-run

      - name: Create npm package tarball
        run: npm pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: "*.tgz"

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: pip-audit Python dependencies
        run: python -m pip install -r requirements.txt && pip-audit -r requirements.txt
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
